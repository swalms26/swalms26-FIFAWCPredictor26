<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC26 Predictor</title>
  <meta name="description" content="FIFA World Cup 2026 score predictor — predict scores, first goalscorers, and climb the leaderboard." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .auth-btn--google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      color: #333;
      border: none;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .auth-btn--google:hover { background: #f0f0f0; transform: translateY(-1px); }
    .auth-btn--google:active { transform: translateY(0); }
    .auth-btn--google:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-ball">⚽</div>
    <div id="loading-msg">Loading...</div>
  </div>

  <!-- Auth Screen -->
  <div id="auth-screen" class="hidden">
    <div class="auth-box">
      <div class="auth-logo">⚽</div>
      <h1 class="auth-title">WC26<br>Predictor</h1>
      <p class="auth-subtitle">Sign in to make your predictions<br>and climb the leaderboard.</p>
      <div class="auth-form">
        <button class="auth-btn--google" onclick="Auth.signInWithGoogle()">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Sign in with Google
        </button>
      </div>
      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <nav id="nav"></nav>
    <main id="main"></main>
  </div>

  <!-- Firebase SDKs (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="data/matches.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/app.js"></script>

  <script>
    function showLoading(msg) {
      document.getElementById('loading-screen').classList.remove('hidden');
      document.getElementById('loading-msg').textContent = msg || 'Loading...';
      document.getElementById('auth-screen').classList.add('hidden');
    }

    function hideLoading() {
      document.getElementById('loading-screen').classList.add('hidden');
    }

    // Check auth state on load
    Auth.checkEmailLink();

    firebase.auth().onAuthStateChanged(async (user) => {
      if (user && !user.isAnonymous) {
        showLoading('Loading your predictions...');
        await App.init(user);
      } else if (!user) {
        hideLoading();
        document.getElementById('auth-screen').classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
